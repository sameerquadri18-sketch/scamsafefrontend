<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C2340"/>
      <stop offset="50%" style="stop-color:#163558"/>
      <stop offset="100%" style="stop-color:#0E1B2E"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4621F"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4621F;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none"/>
    <rect width="1" height="1" x="20" y="20" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow behind shield -->
  <circle cx="600" cy="260" r="180" fill="url(#glow)" opacity="0.5"/>
  <circle cx="600" cy="260" r="120" fill="url(#glow)" opacity="0.3"/>

  <!-- Shield icon (larger) -->
  <g transform="translate(600,250) scale(3)">
    <path d="M0 -40 C-20 -40 -35 -28 -35 -12 C-35 12 0 38 0 38 C0 38 35 12 35 -12 C35 -28 20 -40 0 -40Z" fill="none" stroke="url(#shield)" stroke-width="4.5"/>
    <path d="M-10 -2 L-4 4 L10 -10" fill="none" stroke="#10B981" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ScamSafe text -->
  <text x="600" y="420" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">
    <tspan fill="#F4621F">Scam</tspan><tspan fill="white">Safe</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="470" text-anchor="middle" fill="#8888AA" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500">
    Remove Your Data from 42+ Scammer Databases
  </text>

  <!-- Bottom badges -->
  <g transform="translate(600, 530)">
    <!-- DPDP badge -->
    <rect x="-220" y="-18" width="130" height="36" rx="18" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
    <text x="-155" y="7" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="14" font-weight="600">DPDP Act 2023</text>
    
    <!-- Encrypted badge -->
    <rect x="-65" y="-18" width="130" height="36" rx="18" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="0" y="7" text-anchor="middle" fill="#8B5CF6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">256-bit Encrypted</text>
    
    <!-- Free Scan badge -->
    <rect x="90" y="-18" width="130" height="36" rx="18" fill="rgba(244,98,31,0.12)" stroke="rgba(244,98,31,0.25)" stroke-width="1"/>
    <text x="155" y="7" text-anchor="middle" fill="#F4621F" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Free Scan</text>
  </g>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#shield)"/>
</svg>
